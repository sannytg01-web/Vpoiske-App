global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'vlubvi-backend'
    static_configs:
      - targets: ['backend1:8000', 'backend2:8000', 'backend3:8000']
    metrics_path: /metrics

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'pgbouncer'
    static_configs:
      - targets: ['pgbouncer:9127']
